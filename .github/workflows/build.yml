name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RETENTION: 7

jobs:
  build-windows:
    name: Windows build
    strategy:
      matrix:
        arch: [x64]
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    steps:
      - name: Disable line ending conversion
        run: git config --global core.autocrlf input

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: |
          $vsPath = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise"

          # Find ML64.exe location more specifically
          $ml64Paths = "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\x64\ml64.exe"

          $ml64Found = $false
          $ml64Path = Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue | Select-Object -Last 1
          if ($ml64Path) {
            Write-Host "Found ML64 at: $($ml64Path.FullName)"
            $env:PATH = "$($ml64Path.Directory.FullName);$env:PATH"
            $ml64Found = $true
          }

          if (-not $ml64Found) {
            Write-Host "ML64 not found, trying alternative approach..."
            # Try to use the Developer Command Prompt environment
            $vcvarsPath = "$vsPath\VC\Auxiliary\Build\vcvars64.bat"
            if (Test-Path $vcvarsPath) {
              Write-Host "Setting up Visual Studio environment..."
              cmd /c "`"$vcvarsPath`" && set" | ForEach-Object {
                if ($_ -match '^([^=]+)=(.*)') {
                  [Environment]::SetEnvironmentVariable($matches[1], $matches[2])
                }
              }
            }
          }

          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_CXX_FLAGS="/DMCL_MSM=0" -DCMAKE_C_FLAGS="/DMCL_MSM=0"
          cmake --build build --config Release
          if (Test-Path "build\Release") {
            ls build\Release
          } else {
            Write-Host "Release folder not found, listing build contents:"
            ls build -Recurse -File | Where-Object { $_.Name -like "*.dll" -or $_.Name -like "*.lib" -or $_.Name -like "*.exe" }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: build
          retention-days: ${{ env.RETENTION }}
          if-no-files-found: error
