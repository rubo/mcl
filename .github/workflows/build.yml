name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RETENTION: 7

jobs:
  build-windows:
    name: Windows build
    strategy:
      matrix:
        arch: [x64]
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    steps:
      - name: Disable line ending conversion
        run: git config --global core.autocrlf input

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: |
          # Assume $vsPath is defined (e.g., path to Visual Studio root)
          $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"  # Adjust as needed

          # Define the base path up to the wildcard segment
          $basePath = Join-Path -Path $vsPath -ChildPath "VC\Tools\MSVC"

          # Get all directories under MSVC (version folders)
          $versionDirs = Get-ChildItem -Path $basePath -Directory

          # Parse and sort by version
          $latestVersionDir = $versionDirs |
              Where-Object { $_.Name -match '^\d+(\.\d+)+$' } |
              Sort-Object { [Version]$_.Name } -Descending |
              Select-Object -First 1

          # Build the full path to ml64.exe
          if ($latestVersionDir) {
              $ml64Path = Join-Path -Path $latestVersionDir.FullName -ChildPath "bin\Hostx64\x64\ml64.exe"
              
              if (Test-Path $ml64Path) {
                  Write-Output "Latest ml64.exe found at:"
                  Write-Output $ml64Path

                  $env:PATH = "$($ml64Path.Directory.FullName);$env:PATH"

              } else {
                  Write-Warning "ml64.exe not found in the latest version directory."
              }
          } else {
              Write-Warning "No valid MSVC version directories found."
          }



          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DMCL_MSM=OFF
          cmake --build build --config Release
          if (Test-Path "build\Release") {
            ls build\Release
          } else {
            Write-Host "Release folder not found, listing build contents:"
            ls build -Recurse -File | Where-Object { $_.Name -like "*.dll" -or $_.Name -like "*.lib" -or $_.Name -like "*.exe" }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: build
          retention-days: ${{ env.RETENTION }}
          if-no-files-found: error
