name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RETENTION: 7

jobs:
  build-windows:
    name: Windows build
    strategy:
      matrix:
        arch: [x64]
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    steps:
      - name: Disable line ending conversion
        run: git config --global core.autocrlf input

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: |
          # Find ML64.exe location
          $ml64Path = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Microsoft Visual Studio" -Filter "ml64.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($ml64Path) {
            Write-Host "Found ML64 at: $($ml64Path.FullName)"
            $env:PATH = "$($ml64Path.Directory.FullName);$env:PATH"
          } else {
            Write-Host "ML64 not found, searching in Windows SDK..."
            $ml64Path = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits" -Filter "ml64.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($ml64Path) {
              Write-Host "Found ML64 in Windows SDK at: $($ml64Path.FullName)"
              $env:PATH = "$($ml64Path.Directory.FullName);$env:PATH"
            }
          }
          
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DMCL_MSM=0
          cmake --build build --config Release
          ls build\Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: build
          retention-days: ${{ env.RETENTION }}
          if-no-files-found: error
